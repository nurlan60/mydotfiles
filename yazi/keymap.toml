[[manager.prepend_keymap]]
on   = [ ":","q" ]
run  = "quit"
desc = "Exit the process"

[[manager.prepend_keymap]]
on   = [ "e" ]
run  = 'shell "$EDITOR $@" --block --confirm'
desc = "Edit selected files"

[[manager.prepend_keymap]]
on   = [ "E" ]
run  = 'shell "bat $@" --block --confirm'
desc = "View selected files in bat"

[[manager.prepend_keymap]]
on   = [ "<C-s>" ]
run  = 'shell "$SHELL" --block --confirm'
desc = "Open shell here"

[[manager.prepend_keymap]]
on  = [ "T","H" ]
run = "plugin --sync hide-preview"
desc = "Hide preview pane"

[[manager.prepend_keymap]]
on  = [ "T","M" ]
run = "plugin --sync max-preview"
desc = "Max preview pane"

[[manager.prepend_keymap]]
on  = [ "k" ]
run = "plugin --sync arrow --args=-1"
desc = "Move cursor up"

[[manager.prepend_keymap]]
on  = [ "j" ]
run = "plugin --sync arrow --args=1"
desc = "Move cursor down"

[[manager.prepend_keymap]]
on  = [ "K" ]
run = "plugin --sync parent-arrow --args=-1"
desc = "Move parent up"

[[manager.prepend_keymap]]
on  = [ "J" ]
run = "plugin --sync parent-arrow --args=1"
desc = "Move parent cursor down"

[[manager.prepend_keymap]]
on   = [ "f","g" ]
run  = "plugin fg"
desc = "Find file by content (fuzzy match)"

[[manager.prepend_keymap]]
on   = [ "f","G" ]
run  = "plugin fg --args='rg'"
desc = "Find file by content (ripgrep match)"

[[manager.prepend_keymap]]
on   = [ "f","f" ]
run  = "plugin fg --args='fzf'"
desc = "Find file by filename"

[[manager.prepend_keymap]]
on = [ "b", "a" ]
run = "plugin bookmarks-persistence --args=save"
desc = "Save current position as a bookmark"

[[manager.prepend_keymap]]
on = [ "b", "g" ]
run = "plugin bookmarks-persistence --args=jump"
desc = "Jump to a bookmark"

[[manager.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin bookmarks-persistence --args=delete"
desc = "Delete a bookmark"

[[manager.prepend_keymap]]
on = [ "b", "D" ]
run = "plugin bookmarks-persistence --args=delete_all"
desc = "Delete all bookmarks"
